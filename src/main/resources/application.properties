springdoc.packages-to-scan=utng.edu.mx.prueba
server.port=8035
spring.application.name=utng-prueba
spring.cloud.config.import-check.enabled=false
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# Configuraciµn de la base de datos PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Configuraciµn de Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.entity-scan.base-packages=utng.edu.mx.prueba.entity.empresa

# ? Configuraciµn del Keystore
app.cryto.validafirma.file=C:/keys/miKeystore.jks
app.cryto.validafirma.password=123456

spring.jackson.deserialization.fail-on-invalid-subtype=true
spring.jackson.deserialization.fail-on-numbers-for-enums=true

